pipeline:
  name: canonicalize
  phase: 1
  description: >
    Lectura reproducible de corpora, normalización mínima, escritura silver en Parquet
    y reportes estructurales.

user_request:
  approximate_token_budget: 0
  target_task: seq2seq_mt
  target_domain: mixed
  dataset_mix: {}

inputs:
  dataset_configs:
    - configs/datasets/dgt.yaml
    - configs/datasets/eubookshop.yaml
    - configs/datasets/europarl.yaml
    - configs/datasets/multiun.yaml
    - configs/datasets/opensubtitles.yaml
    - configs/datasets/unpc.yaml

outputs:
  write_segments: true
  write_pairs: true
  write_documents: true
  write_reports: true
