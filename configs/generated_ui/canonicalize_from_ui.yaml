pipeline:
  name: canonicalize
  phase: 1
  description: 'Lectura reproducible de corpora, normalización mínima, escritura silver
    en Parquet y reportes estructurales.

    '
user_request:
  approximate_token_budget: 0
  target_task: seq2seq_mt
  target_domain: mixed
  dataset_mix: {}
inputs:
  dataset_configs:
  - configs/generated_ui/dgt.yaml
outputs:
  write_segments: true
  write_pairs: true
  write_documents: true
  write_reports: true
runtime:
  max_pairs: 100
  max_segments: 0
  max_documents: 0
  max_tokens_approx: 1000
  stop_after_first_dataset: true
  export_samples: true
  sample_export_size: 20
