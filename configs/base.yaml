project:
  name: textforge
  version: 0.2.0

runtime:
  random_seed: 42
  sample_size: 8
  max_preview_chars: 240

text_normalization:
  unicode_form: NFC
  preserve_case: true
  collapse_internal_whitespace: true
  strip_outer_whitespace: true
  remove_control_characters: true
  repair_encoding_when_possible: true
  replace_non_breaking_spaces: true
  preserve_protocol_markers: true

phase1:
  write_segments: true
  write_pairs: true
  write_documents: true
  write_reports: true
  write_manifest: true
  emit_unaligned_streams: true
